<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/app-shell.css">
    <script src="../assets/app-shell.js"></script>
    <link rel="stylesheet" href="index.css">
    <style>
        .password_main {
            max-width: 500px;
            margin: 40px auto;
        }
        
        .password_input input {
            width: 100%;
            background: transparent;
            border: 0;
            outline: 0;
            padding: 12px 15px;
            font-size: 16px;
            color: var(--text-dark);
        }

        .password_input ion-icon {
            color: var(--primary-color);
            margin-left: 15px;
            font-size: 1.2rem;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: modalSlideDown 0.4s ease-out;
        }
        @keyframes modalSlideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h3 { margin-bottom: 10px; font-size: 1.5rem; color: var(--text-dark); }
        .modal-content p { margin-bottom: 30px; color: #666; line-height: 1.5; }
        .modal-footer { display: flex; justify-content: center; gap: 15px; }
        .btn-confirm, .btn-close {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-confirm { background: var(--primary-color); color: white; }
        .btn-close { background: #f0f0f0; color: #555; }

        /* Global Search Dropdown */
        .search {
            position: relative;
        }
        .search-dropdown {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            width: 100%;
            background: var(--white);
            border: 1px solid var(--border-color, #e2e8f0);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
            z-index: 2000;
            max-height: 450px;
            overflow-y: auto;
            animation: dropdownFade 0.2s ease-out;
        }
        @keyframes dropdownFade {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .search-dropdown.active {
            display: block;
        }
        .search-result-item {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color, #e2e8f0);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background: var(--primary-color-light); }
        .search-result-item h4 {
            font-size: 0.95rem;
            color: var(--primary-color-dark);
            margin-bottom: 4px;
            margin-top: 0;
        }
        .search-result-item p {
            font-size: 0.8rem;
            color: var(--text-light, #767268);
            margin-bottom: 5px;
        }
        .search-result-item .type-badge {
            display: inline-block;
            font-size: 0.65rem;
            padding: 3px 10px;
            border-radius: 4px;
            background: var(--primary-color);
            color: var(--white);
            text-transform: uppercase;
            font-weight: 700;
        }
        .search-no-results {
            padding: 20px;
            text-align: center;
            color: var(--text-light, #767268);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="navigation">
            <ul>
                <li>
                    <a href="#">
                        <div class="nav_logo"> <strong>Noorie <span>Clinic</span></strong></div>
                    </a>
                </li>
                <li>
                    <a href="doctor.html">
                        <span class="icon"><ion-icon name="home-outline"></ion-icon></span>
                        <span class="title">Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="notification.html">
                        <span class="icon"><ion-icon name="notifications-outline"></ion-icon></span>
                        <span class="title">Notifications</span>
                    </a>
                </li>
                <li>
                    <a href="profile.html">
                        <span class="icon"><ion-icon name="person-outline"></ion-icon></span>
                        <span class="title">Manage Profile</span>
                    </a>
                </li>
                <li>
                    <a href="password.html">
                        <span class="icon"><ion-icon name="lock-closed-outline"></ion-icon></span>
                        <span class="title">Change Password</span>
                    </a>
                </li>
                <li>
                    <a href="../index.html">
                        <span class="icon"><ion-icon name="log-out-outline"></ion-icon></span>
                        <span class="title">Log Out</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="main">
            <div class="topbar">
                <div class="toggle"><ion-icon name="menu-outline"></ion-icon></div>
                <div class="search">
                    <label>
                        <input type="text" placeholder="Search ID or Email...">
                        <ion-icon name="search-outline"></ion-icon>
                    </label>
                    <div id="searchDropdown" class="search-dropdown"></div>
                </div>
                <div class="user"><img src="customer01.jpg" alt=""></div>
            </div>

            <div class="password_header">
                <div class="password_main">
                    <h2 style="margin-bottom: 20px; color: var(--primary-color);">Security Settings</h2>
                    <form id="changePasswordForm">
                        <div class="password_input">
                            <ion-icon name="key-outline"></ion-icon>
                            <input type="password" id="currentPassword" required placeholder="Current Password">
                        </div>

                        <div class="password_input">
                            <ion-icon name="lock-closed-outline"></ion-icon>
                            <input type="password" id="newPassword" required placeholder="New Password">
                        </div>
                        <p style="font-size: 11px; color: var(--text-light); text-align: left; margin: -10px 0 15px 5px;">
                            * Password must be at least 8 characters with letters, numbers, and symbols.
                        </p>

                        <div class="password_input">
                            <ion-icon name="shield-checkmark-outline"></ion-icon>
                            <input type="password" id="confirmPassword" required placeholder="Confirm New Password">
                        </div>

                        <div class="button_field" style="margin-top: 30px;">
                            <button type="submit" style="width: 100%;">Update Security Password</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Action Confirmation Modal -->
    <div id="doctorActionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Status</h3>
            <p id="modalMessage"></p>
            <div class="modal-footer">
                <button id="modalConfirmBtn" class="btn-confirm">Confirm</button>
                <button id="modalCloseBtn" class="btn-close">Close</button>
            </div>
        </div>
    </div>

    <script src="doctor.js"></script>
    <script>
        document.getElementById("changePasswordForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const currentPassword = document.getElementById("currentPassword").value;
            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const doctorId = localStorage.getItem("userId");

            if (newPassword !== confirmPassword) {
                showDoctorModal("Validation Error", "New passwords do not match. Please try again.");
                return;
            }

            // Password complexity validation: 8+ chars, alphabet, number, special char
            const passwordRegex = /^(?=.*[a-zA-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,}$/;
            if (!passwordRegex.test(newPassword)) {
                showDoctorModal("Security Warning", "New password must be at least 8 characters long and include alphabets, numbers, and special characters.");
                return;
            }

            if (doctorId === "mock_user") {
                showDoctorModal("Success", "Password Changed Successfully! (Offline Mock Mode)", () => {
                    const mockNotifs = JSON.parse(localStorage.getItem("mock_notifications") || "[]");
                    mockNotifs.unshift({ message: "Your professional account password was changed successfully.", created_at: new Date().toISOString() });
                    localStorage.setItem("mock_notifications", JSON.stringify(mockNotifs));
                    document.getElementById("changePasswordForm").reset();
                });
                return;
            }

            try {
                const response = await fetch(`${backendUrl}/api/doctor/${doctorId}/password`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ currentPassword, newPassword })
                });

                const result = await response.json();

                if (response.ok) {
                    showDoctorModal("Success", "Your password has been changed successfully. Please keep it secure.", () => {
                        document.getElementById("changePasswordForm").reset();
                    });
                } else {
                    showDoctorModal("Action Failed", result.error || "Could not update password.");
                }
            } catch (err) {
                console.error("Password Update Error:", err);
                showDoctorModal("Network Error", "Unable to connect to the server. Please try again later.");
            }
        });
    </script>

    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/app-shell.css">
    <script src="../assets/app-shell.js"></script>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <!-- =============== Navigation ================ -->
    <div class="container">
        <div class="navigation">
            <ul>
                <li>
                    <a href="#">
                        <div class="nav_logo"> <strong>Noorie <span>Clinic</strong><span></span></div>
                    </a>
                </li>

                <li>
                    <a href="doctor.html">
                        <span class="icon">
                            <ion-icon name="home-outline"></ion-icon>
                        </span>
                        <span class="title">Dashboard</span>
                    </a>
                </li>

                <li>
                    <a href="notification.html">
                        <span class="icon">
                            <ion-icon name="notifications-outline"></ion-icon>
                        </span>
                        <span class="title">Notifications</span>
                    </a>
                </li>

                <li>
                    <a href="profile.html">
                        <span class="icon">
                            <ion-icon name="person-outline"></ion-icon>
                        </span>
                        <span class="title">Manage Profile</span>
                    </a>
                </li>

                <li>
                    <a href="password.html">
                        <span class="icon">
                            <ion-icon name="lock-closed-outline"></ion-icon>
                        </span>
                        <span class="title">Change Password</span>
                    </a>
                </li>

                <li>
                    <a href="#">
                        <span class="icon">
                            <ion-icon name="log-out-outline"></ion-icon>
                        </span>
                        <span class="title">Log Out</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- ========================= Main ==================== -->
        <div class="main">
            <div class="topbar">
                <div class="toggle">
                    <ion-icon name="menu-outline"></ion-icon>
                </div>

                <div class="search">
                    <label>
                        <input type="text" placeholder="Search here">
                        <ion-icon name="search-outline"></ion-icon>
                    </label>
                </div>

                <div class="user">
                    <img src="customer01.jpg" alt="">
                </div>
            </div>

            <!-- ======================= Cards ================== -->
            <div class="cardBox">
                <div class="card" id="card-success">
                    <div>
                        <div class="numbers">0</div>
                        <div class="cardName">Successfull Appointments</div>
                    </div>

                    <div class="iconBx">
                        <ion-icon name="heart-outline"></ion-icon>
                    </div>
                </div>

                <div class="card" id="card-pending">
                    <div>
                        <div class="numbers">0</div>
                        <div class="cardName">Pending Appointments</div>
                    </div>

                    <div class="iconBx">
                        <ion-icon name="heart-half-outline"></ion-icon>
                    </div>
                </div>

                <div class="card" id="card-reject">
                    <div>
                        <div class="numbers">0</div>
                        <div class="cardName">Rejected Appointments</div>
                    </div>

                    <div class="iconBx">
                        <ion-icon name="heart-dislike-outline"></ion-icon>
                    </div>
                </div>
            </div>

            <!-- ================ Appointments Details List ================= -->
            <div class="details">
                <div class="recentOrders">
                    <div class="cardHeader">
                        <h2>Recent Appointments</h2>
                        <a href="#" class="btn">View All</a>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <td>Patients Name</td>
                                <td>Appointment Date</td>
                                <td>Serial No.</td>
                                <td>Status</td>
                                <td>Action</td>
                            </tr>
                        </thead>

                        <tbody>
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 20px; color: var(--text-dark);">Loading appointments...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- =========== Scripts =========  -->
    <script src="doctor.js"></script>

    <!-- ====== ionicons ======= -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>

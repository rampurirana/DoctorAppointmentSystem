<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book appointment</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/app-shell.css">
    <script src="../assets/app-shell.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <style>
        /* Topbar Responsiveness Fix */
        .topbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 15px;
        }

        #welcomeTextCard {
            white-space: nowrap;
            flex-shrink: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px !important;
        }

        @media (max-width: 768px) {
            #welcomeTextCard {
                font-size: 0.9rem !important;
                max-width: 120px; /* Further limit name width on tablets */
            }
            .search {
                flex: 1; /* Allow search to take remaining space */
                max-width: 180px;
                margin: 0 5px !important;
            }
        }

        @media (max-width: 480px) {
            #welcomeTextCard {
                display: none; /* Hide name on small mobiles to prioritize search and toggle */
            }
            .search {
                margin: 0 5px !important;
            }
        }

        /* Calendar Picker Color Match */
        #appointmentDate::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(48%) sepia(13%) saturate(3207%) hue-rotate(130deg) brightness(95%) contrast(80%);
            padding: 5px;
            border-radius: 3px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: modalSlideDown 0.4s ease-out;
        }
        @keyframes modalSlideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h3 {
            margin-bottom: 10px;
            font-size: 1.5rem;
            color: var(--text-dark);
        }
        .modal-content p {
            margin-bottom: 30px;
            color: #666;
            line-height: 1.5;
        }
        .modal-footer {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-confirm, .btn-close {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-confirm { background: var(--primary-color); color: white; }
        .btn-close { background: #f0f0f0; color: #555; }
    </style>
</head>

<body>
    <!-- =============== Navigation ================ -->
    <div class="container">
        <div class="navigation">
            <ul>
                <li>
                    <a href="#">
                        <div class="nav_logo"> <strong>Noorie <span>Clinic</span></strong></div>
                    </a>
                </li>

                <li>
                    <a href="dashboard.html">
                        <span class="icon">
                            <ion-icon name="home-outline"></ion-icon>
                        </span>
                        <span class="title">Dashboard</span>
                    </a>
                </li>

                <li>
                    <a href="appointment.html">
                        <span class="icon">
                            <ion-icon name="alarm-outline"></ion-icon>
                        </span>
                        <span class="title">Book Appointments</span>
                    </a>
                </li>

                <li>
                    <a href="notification.html">
                        <span class="icon">
                            <ion-icon name="notifications-outline"></ion-icon>
                        </span>
                        <span class="title">Notifications</span>
                    </a>
                </li>

                <li>
                    <a href="profile.html">
                        <span class="icon">
                            <ion-icon name="person-outline"></ion-icon>
                        </span>
                        <span class="title">Manage Profile</span>
                    </a>
                </li>

                <li>
                    <a href="password.html">
                        <span class="icon">
                            <ion-icon name="lock-closed-outline"></ion-icon>
                        </span>
                        <span class="title">Change Password</span>
                    </a>
                </li>

                <li>
                    <a href="../index.html">
                        <span class="icon">
                            <ion-icon name="log-out-outline"></ion-icon>
                        </span>
                        <span class="title">Log Out</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- ========================= Main ==================== -->
        <div class="main">
            <div class="topbar">
                <div class="toggle">
                    <ion-icon name="menu-outline"></ion-icon>
                </div>

                <div class="search">
                    <label>
                        <input type="text" placeholder="Search here">
                        <ion-icon name="search-outline"></ion-icon>
                    </label>
                </div>

                <div class="user">
                    <img src="customer01.jpg" alt="">
                </div>
            </div>

            <!-- ================ Appointments Details List ================= -->
            <div class="form_header">
                <div class="form_box">
                    <form id="appointmentForm">
                        <div class="input_group">
                            <div class="input_field">
                                <i class="fa-solid fa-user"></i>
                                <input type="text" id="patientName" required placeholder="Enter Patient Name">
                            </div>
    
                            <div class="input_field">
                                <i class="fa-solid fa-calendar-days"></i>
                                <input type="text" id="appointmentDate" onfocus="this.type='date'" required placeholder="Select Appointment Date">
                            </div>
    
                            <div class="input_field">
                                <i class="fa-solid fa-stethoscope"></i>
                                <select id="selectdoctortype" required>
                                    <option value="" disabled selected>Select Doctor Type</option>
                                </select>
                            </div>
    
                            <div class="input_field">
                                <i class="fa-solid fa-user-doctor"></i>
                                <select id="selectdoctor" required>
                                    <option value="" disabled selected>Select Doctor</option>
                                </select>
                            </div>
                        
                            <div class="button_field">
                                <button type="submit">Book Appointment</button>
                            </div>
                        </div> <!--end input group-->
                    </form> <!--end form-->
                </div> <!--end form box-->
            </div>

        </div>
    </div>

    <!-- Action Confirmation Modal -->
    <div id="bookingActionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Status</h3>
            <p id="modalMessage"></p>
            <div class="modal-footer">
                <button id="modalCloseBtn" class="btn-close">Close</button>
            </div>
        </div>
    </div>

    <!-- =========== Scripts =========  -->
    <script src="index.js"></script>

    <script>
        // Session security check
        const userId = localStorage.getItem("userId");
        if (!userId) {
            window.location.replace("../index.html");
        }

        function showBookingModal(title, message, redirect = false) {
            const modal = document.getElementById("bookingActionModal");
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("modalMessage").innerText = message;
            modal.style.display = "flex";
            document.getElementById("modalCloseBtn").onclick = () => {
                modal.style.display = "none";
                if (redirect) window.location.href = "dashboard.html";
            };
        }

        const backendUrl = "http://localhost:10000";
        let availableDoctors = [];

        function populateDoctorOptions() {
            const specialty = document.getElementById("selectdoctortype").value;
            const doctorSelect = document.getElementById("selectdoctor");
            const doctors = availableDoctors.filter((doctor) => doctor.specialty === specialty);

            doctorSelect.innerHTML = `<option value="" disabled selected>Select Doctor</option>`;
            doctors.forEach((doctor) => {
                const option = document.createElement("option");
                option.value = doctor.id;
                
                if (doctor.is_available === false) {
                    option.textContent = `${doctor.name} (Currently Unavailable)`;
                    option.disabled = true;
                } else {
                    option.textContent = doctor.name;
                }
                doctorSelect.appendChild(option);
            });
        }

        async function loadAvailableDoctors() {
            const specialtySelect = document.getElementById("selectdoctortype");
            try {
                let data;
                if (userId === "mock_user") {
                    data = [
                        { id: "mock_doctor_1", name: "Dr. Rampravesh Rana", specialty: "Cardiologist" },
                        { id: "mock_doctor_2", name: "Dr. Aryan Rana", specialty: "Dermatologist" },
                        { id: "mock_doctor_3", name: "Dr. Pankaj Yadav", specialty: "Orthopedist" }
                    ];
                } else {
                    const response = await fetch(`${backendUrl}/api/doctors`);
                    data = await response.json();
                    if (!response.ok) throw new Error(data.error || "Could not load doctors");
                }
                availableDoctors = data;

                const specialties = [...new Set(data.map((doctor) => doctor.specialty))];
                specialtySelect.innerHTML = `<option value="" disabled selected>Select Doctor Type</option>`;
                specialties.forEach((specialty) => {
                    const option = document.createElement("option");
                    option.value = specialty;
                    option.textContent = specialty;
                    specialtySelect.appendChild(option);
                });

                if (specialties.length === 0) {
                    specialtySelect.innerHTML = `<option value="" disabled selected>No doctors available</option>`;
                }
            } catch (err) {
                console.error("Failed to fetch doctors:", err);
                specialtySelect.innerHTML = `<option value="" disabled selected>Doctors unavailable</option>`;
            }
        }

        // Restrict date picker to present and future dates
        document.addEventListener("DOMContentLoaded", () => {
            const dateInput = document.getElementById("appointmentDate");
            const today = new Date().toISOString().split("T")[0];
            dateInput.setAttribute("min", today);
            document.getElementById("selectdoctortype").addEventListener("change", populateDoctorOptions);
            loadAvailableDoctors();
        });

        // Bind form submission
        const form = document.getElementById("appointmentForm");
        if (form) {
            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                // Get values by ID for reliability
                const patientName = document.getElementById("patientName").value.trim();
                const appointmentDate = document.getElementById("appointmentDate").value;
                
                const doctorType = document.getElementById("selectdoctortype").value;
                const doctorId = document.getElementById("selectdoctor").value;
                const selectedDoctor = availableDoctors.find((doctor) => doctor.id === doctorId);
                const doctorName = selectedDoctor?.name || "";

                // Retrieve fresh userId right before submission
                const currentUserId = localStorage.getItem("userId");

                // Frontend validation check
                if (!currentUserId || !patientName || !appointmentDate || !doctorType || !doctorId || !doctorName) {
                    const missing = [];
                    if (!currentUserId) missing.push("User Session (Log in again)");
                    if (!patientName) missing.push("Patient Name");
                    if (!appointmentDate) missing.push("Appointment Date");
                    if (!doctorType) missing.push("Doctor Type");
                    if (!doctorId || !doctorName) missing.push("Doctor Name");
                    
                    showBookingModal("Input Error", "Missing fields: " + missing.join(", "));
                    console.error("Missing fields:", { currentUserId, patientName, appointmentDate, doctorType, doctorName });
                    return;
                }

                if (currentUserId === "mock_user") {
                    const mockApps = JSON.parse(localStorage.getItem("mock_appointments") || "[]");
                    const dateStr = appointmentDate.replace(/-/g, '');
                    const sameDayApps = mockApps.filter(a => a.appointment_date === appointmentDate).length;
                    const mockAptId = `APT${dateStr}${String(sameDayApps + 1).padStart(3, '0')}`;

                    mockApps.unshift({
                        id: "mock_" + Date.now(),
                        appointment_id: mockAptId,
                        patient_name: patientName,
                        doctor_id: doctorId,
                        doctor_name: doctorName,
                        doctor_type: doctorType,
                        appointment_date: appointmentDate,
                        booking_slot: null,
                        status: "Pending"
                    });
                    localStorage.setItem("mock_appointments", JSON.stringify(mockApps));
                    
                    // Log an offline notification too!
                    const mockNotifs = JSON.parse(localStorage.getItem("mock_notifications") || "[]");
                    mockNotifs.unshift({
                        message: `Appointment for ${patientName} with ${doctorName} was requested on ${appointmentDate}. Serial number will be assigned after doctor approval. Status: Pending.`,
                        created_at: new Date().toISOString()
                    });
                    localStorage.setItem("mock_notifications", JSON.stringify(mockNotifs));

                    showBookingModal("Success", "Appointment Booked Successfully! (Offline Mode)", true);
                    return;
                }

                try {
                    const response = await fetch(`${backendUrl}/api/appointments`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            userId: currentUserId,
                            patientName,
                            appointmentDate,
                            doctorId
                        })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        showBookingModal("Success", "Appointment Booked Successfully!", true);
                    } else {
                        showBookingModal("Booking Error", data.error);
                    }
                } catch (err) {
                    console.error(err);
                    showBookingModal("Network Error", "Could not connect to the booking server.");
                }
            });
        }
    </script>

    <!-- ====== ionicons ======= -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>

</body>

</html>

                                    <option value="doctor">Dr. Neeraj Pandit</option>
                                    <option value="doctor">Dr. Shubham Singh</option>
                                    <option value="doctor">Dr. Suraj Rana</option>
                                    <option value="doctor">Dr. Pankaj Yadav</option>
                                    <option value="doctor">Dr. Himanshu Rana</option>
                                    <option value="doctor">Dr. Baleshwar Rana</option>
                                    <option value="doctor">Dr. Sunil Rana</option>
                                    <option value="doctor">Dr. Anushka Rana</option>

    <!-- =========== Scripts =========  -->
    <script src="index.js"></script>

    <script>
        // Session security check
        const userId = localStorage.getItem("userId");
        if (!userId) {
            alert("Please log in first.");
            window.location.href = "../index.html";
        }

        const backendUrl = "https://doctor-backend-yrry.onrender.com";

        // Bind form submission
        const form = document.getElementById("appointmentForm");
        if (form) {
            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const patientName = document.querySelector('input[placeholder="Enter Patient Name"]').value;
                const appointmentDateInput = document.querySelector('input[placeholder="Select Appointment Date"]');
                const appointmentDate = appointmentDateInput.value;
                
                const selectTime = document.getElementById("selecttime");
                const appointmentTime = selectTime.options[selectTime.selectedIndex].text;
                
                const selectDoctorType = document.getElementById("selectdoctortype");
                const doctorType = selectDoctorType.options[selectDoctorType.selectedIndex].text;
                
                const selectDoctor = document.getElementById("selectdoctor");
                const doctorName = selectDoctor.options[selectDoctor.selectedIndex].text;

                if (userId === "mock_user") {
                    alert("Appointment Booked Successfully! (Offline Mock Mode)");
                    
                    const mockApps = JSON.parse(localStorage.getItem("mock_appointments") || "[]");
                    mockApps.unshift({
                        doctor_name: doctorName,
                        doctor_type: doctorType,
                        appointment_date: appointmentDate,
                        appointment_time: appointmentTime,
                        status: "Pending"
                    });
                    localStorage.setItem("mock_appointments", JSON.stringify(mockApps));
                    
                    // Log an offline notification too!
                    const mockNotifs = JSON.parse(localStorage.getItem("mock_notifications") || "[]");
                    mockNotifs.unshift({
                        message: `Appointment for ${patientName} with ${doctorName} booked successfully on ${appointmentDate} at ${appointmentTime}. Status: Pending.`,
                        created_at: new Date().toISOString()
                    });
                    localStorage.setItem("mock_notifications", JSON.stringify(mockNotifs));

                    window.location.href = "dashboard.html";
                    return;
                }

                try {
                    const response = await fetch(`${backendUrl}/api/appointments`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            userId,
                            patientName,
                            appointmentDate,
                            appointmentTime,
                            doctorType,
                            doctorName
                        })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        alert("Appointment Booked Successfully!");
                        window.location.href = "dashboard.html";
                    } else {
                        alert("Error: " + data.error);
                    }
                } catch (err) {
                    console.error(err);
                    alert("Network Error: Could not connect to the booking server.");
                }
            });
        }
    </script>

                <li>

                <li>

                </li>
            </ul>
        </div>

        <!-- ========================= Main ==================== -->
        <div class="main">
            <div class="topbar">
                <div class="toggle">
                    <ion-icon name="menu-outline"></ion-icon>
                </div>

                <div class="search">
                    <label>
                        <input type="text" placeholder="Search here">
                        <ion-icon name="search-outline"></ion-icon>
                    </label>
                </div>

                <div class="user">
                    <img src="customer01.jpg" alt="">
                </div>
            </div>
        
            <!-- =============== Profile Section =============== -->
            <div class="profile_container">
                <div class="profile_main">
                    <div class="profile_left">
                        <form action="">
                            <div class="form_grid">
                                <div class="form_row">
                                    <label for="name">Name</label>
                                    <input type="text" id="name" value="RAMPRAVESH RANA">
                                </div>

                                <div class="form_row">
                                    <label for="mobile">Mobile Number</label>
                                    <input type="tel" id="mobile" value="+91 6204996033">
                                </div>

                                <div class="form_row">
                                    <label for="email">Email ID</label>
                                    <input type="email" id="email" value="rampraveshrana1435@gmail.com">
                                </div>

                                <div class="form_row">
                                    <label for="gender">Gender<label>
                                    <input type="text" id="gender" value="MALE">
                                </div>

                                <div class="form_row">
                                    <label for="aadhaar">Aadhaar Number</label>
                                    <input type="text" id="aadhaar" value="908041083824">
                                </div>

                                <div class="form_row">
                                    <label for="blood_group">Blood Group</label>
                                    <input type="text" id="blood_group" value="Blood Group O+">
                                </div>

                                <div class="form_row">
                                    <label for="country">Country<label>
                                    <input type="text" id="country" value="INDIA">
                                </div>

                                <div class="form_row">
                                    <label for="state">State</label>
                                    <input type="text" id="state" value="JHARKHAND">
                                </div>

                                <div class="form_row">
                                    <label for="district">District</label>
                                    <input type="text" id="district" value="HAZARIBAGH">
                                </div>

                                <div class="form_row">
                                    <label for="pincode">Pin Code</label>
                                    <input type="text" id="pincode" value="825323">
                                </div>
                            </div>

                            <div class="update_button">
                                <button type="submit">Update Profile</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
    <script src="index.js"></script>

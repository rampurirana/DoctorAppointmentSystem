    <script src="index.js"></script>

    <script>
        // Session security check
        const userId = localStorage.getItem("userId");
        if (!userId) {
            alert("Please log in first.");
            window.location.href = "../index.html";
        }

        const backendUrl = "https://doctor-backend-yrry.onrender.com";

        // Fetch profile data on page load
        async function fetchProfile() {
            if (userId === "mock_user") {
                const defaultProfile = {
                    name: "Demo Patient",
                    mobile: "+91 9999999999",
                    email: "demopatient@gmail.com",
                    gender: "MALE",
                    aadhaar: "123456789012",
                    blood_group: "O+",
                    country: "INDIA",
                    state: "JHARKHAND",
                    district: "HAZARIBAGH",
                    pincode: "825301"
                };
                const mockProfile = JSON.parse(localStorage.getItem("mock_profile")) || defaultProfile;
                populateProfile(mockProfile);
                return;
            }
            try {
                const response = await fetch(`${backendUrl}/api/user/${userId}`);
                if (response.ok) {
                    const user = await response.json();
                    populateProfile(user);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function populateProfile(user) {
            document.getElementById("name").value = user.name || "";
            document.getElementById("mobile").value = user.mobile || "";
            document.getElementById("email").value = user.email || "";
            document.getElementById("gender").value = user.gender || "";
            document.getElementById("aadhaar").value = user.aadhaar || "";
            document.getElementById("blood_group").value = user.blood_group || "";
            document.getElementById("country").value = user.country || "INDIA";
            document.getElementById("state").value = user.state || "";
            document.getElementById("district").value = user.district || "";
            document.getElementById("pincode").value = user.pincode || "";
        }

        // Bind form submission to update profile
        const form = document.getElementById("profileForm");
        if (form) {
            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const name = document.getElementById("name").value;
                const mobile = document.getElementById("mobile").value;
                const email = document.getElementById("email").value;
                const gender = document.getElementById("gender").value;
                const aadhaar = document.getElementById("aadhaar").value;
                const blood_group = document.getElementById("blood_group").value;
                const country = document.getElementById("country").value;
                const state = document.getElementById("state").value;
                const district = document.getElementById("district").value;
                const pincode = document.getElementById("pincode").value;

                if (userId === "mock_user") {
                    alert("Profile Updated Successfully! (Offline Mock Mode)");
                    const mockProfile = {
                        name, mobile, email, gender, aadhaar, blood_group, country, state, district, pincode
                    };
                    localStorage.setItem("mock_profile", JSON.stringify(mockProfile));
                    localStorage.setItem("userName", name);
                    location.reload();
                    return;
                }

                try {
                    const response = await fetch(`${backendUrl}/api/user/${userId}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            name,
                            mobile,
                            email,
                            gender,
                            aadhaar,
                            blood_group,
                            country,
                            state,
                            district,
                            pincode
                        })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        alert("Profile Updated Successfully!");
                        localStorage.setItem("userName", name);
                        location.reload();
                    } else {
                        alert("Error: " + data.error);
                    }
                } catch (err) {
                    console.error(err);
                    alert("Network Error: Could not connect to the profile server.");
                }
            });
        }

        // Load profile
        fetchProfile();
    </script>

        function updateDistrictDropdown(state, selectedDistrict = "") {
            const districtSelect = document.getElementById("district");
            districtSelect.innerHTML = '<option value="" disabled selected>Select District</option>';
            if (stateDistricts[state]) {
                stateDistricts[state].forEach(dist => {
                    const opt = new Option(dist, dist);
                    districtSelect.add(opt);
                });
                if (selectedDistrict) districtSelect.value = selectedDistrict;
            }
        }

        // Setup name and email hints (always) and lock them (if already updated)
        function setupNameEmailFields() {
            const nameInput = document.getElementById("name");
            const emailInput = document.getElementById("email");
            const isNameLocked = localStorage.getItem(`name_updated_${userId}`) === "true";
            const isEmailLocked = localStorage.getItem(`email_updated_${userId}`) === "true";

            if (nameInput && !nameInput.parentElement.querySelector(".lock-hint")) {
                if (isNameLocked) nameInput.setAttribute("readonly", true);
                // Add lock hint below input
                const hint = document.createElement("span");
                hint.className = "lock-hint";
                hint.innerHTML = `<ion-icon name="${isNameLocked ? 'lock-closed-outline' : 'information-circle-outline'}"></ion-icon> Name can only be updated once`;
                nameInput.parentElement.appendChild(hint);
            }
            if (emailInput && !emailInput.parentElement.querySelector(".lock-hint")) {
                if (isEmailLocked) emailInput.setAttribute("readonly", true);
                const hint = document.createElement("span");
                hint.className = "lock-hint";
                hint.innerHTML = `<ion-icon name="${isEmailLocked ? 'lock-closed-outline' : 'information-circle-outline'}"></ion-icon> Email can only be updated once`;
                emailInput.parentElement.appendChild(hint);
            }
        }

        // Fetch profile data on page load
        async function fetchProfile() {
            if (userId === "mock_user") {
                const defaultProfile = {
                    name: "Demo Patient",
                    mobile: "",
                    email: "demopatient@gmail.com",
                    gender: "",
                    aadhaar: "",
                    blood_group: "",
                    country: "INDIA",
                    state: "",
                    district: "",
                    pincode: ""
                };
                const mockProfile = JSON.parse(localStorage.getItem("mock_profile")) || defaultProfile;
                populateProfile(mockProfile);
                return;
            }
            try {
                const response = await fetch(`${backendUrl}/api/user/${userId}`);
                if (response.ok) {
                    const user = await response.json();
                    populateProfile(user);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function populateProfile(user) {
            // Store original values to check for changes later
            originalName = user.name || "";
            originalEmail = user.email || "";

            // Populate values
            document.getElementById("name").value = originalName;
            document.getElementById("email").value = originalEmail;

            // Populate Dropdowns
            if (user.gender) document.getElementById("gender").value = user.gender;
            if (user.blood_group) document.getElementById("blood_group").value = user.blood_group;
            if (user.state) {
                document.getElementById("state").value = user.state;
                updateDistrictDropdown(user.state, user.district);
            }

            // Text fields show 'NA' if empty/null
            document.getElementById("mobile").value = user.mobile || "NA";
            document.getElementById("aadhaar").value = user.aadhaar || "NA";
            document.getElementById("country").value = user.country || "INDIA";
            document.getElementById("pincode").value = user.pincode || "NA";

            // Always setup fields to show hints, lock them only if already updated
            setupNameEmailFields();
        }

        // Clear 'NA' when user clicks on a field to edit
        document.addEventListener("DOMContentLoaded", () => {
            const inputs = document.querySelectorAll('#profileForm input');
            const numericFields = ['mobile', 'aadhaar', 'pincode'];
            inputs.forEach(input => {
                // Get the label text for this input to create a dynamic placeholder
                const labelText = input.previousElementSibling?.innerText || "data";

                input.addEventListener("focus", () => {
                    if (input.hasAttribute("readonly")) return;

                    if (input.value === "NA") {
                        input.value = "";
                    }
                    // Update placeholder on click/focus
                    input.placeholder = `Please enter ${labelText.toLowerCase()}`;
                });
                input.addEventListener("blur", () => {
                    if (input.value.trim() === "") {
                        input.value = "NA";
                    }
                });
                // Numeric restriction for specific fields
                if (numericFields.includes(input.id)) {
                    input.addEventListener("input", (e) => {
                        e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    });
                }
            });
        });

        // Bind form submission to update profile
        const form = document.getElementById("profileForm");
        if (form) {
            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const name = document.getElementById("name").value.trim();
                const mobile = document.getElementById("mobile").value.trim();
                const email = document.getElementById("email").value.trim();
                const gender = document.getElementById("gender").value.trim();
                const aadhaar = document.getElementById("aadhaar").value.trim();
                const blood_group = document.getElementById("blood_group").value.trim();
                const country = document.getElementById("country").value.trim();
                const state = document.getElementById("state").value.trim();
                const district = document.getElementById("district").value.trim();
                const pincode = document.getElementById("pincode").value.trim();

                // Validation: All fields except Name and Email are required and cannot be "NA"
                const fieldsToValidate = [
                    { id: "mobile", label: "Mobile Number" },
                    { id: "gender", label: "Gender" },
                    { id: "aadhaar", label: "Aadhaar Number" },
                    { id: "blood_group", label: "Blood Group" },
                    { id: "country", label: "Country" },
                    { id: "state", label: "State" },
                    { id: "district", label: "District" },
                    { id: "pincode", label: "Pin Code" }
                ];

                for (const field of fieldsToValidate) {
                    const val = document.getElementById(field.id).value.trim();
                    if (val === "" || val === "NA") {
                        alert(`Please enter real data for ${field.label}. 'NA' is not allowed.`);
                        document.getElementById(field.id).focus();
                        return;
                    }
                }

                // Specific Format Validations
                const mobileRegex = /^[0-9]{10}$/;
                const aadhaarRegex = /^[0-9]{12}$/;
                const pincodeRegex = /^[0-9]{6}$/;

                if (!mobileRegex.test(mobile)) {
                    alert("Mobile number must be exactly 10 numeric digits.");
                    document.getElementById("mobile").focus();
                    return;
                }
                if (!aadhaarRegex.test(aadhaar)) {
                    alert("Aadhaar number must be exactly 12 numeric digits.");
                    document.getElementById("aadhaar").focus();
                    return;
                }
                if (!pincodeRegex.test(pincode)) {
                    alert("Pin Code must be exactly 6 numeric digits.");
                    document.getElementById("pincode").focus();
                    return;
                }

                const profileData = {
                    name,
                    mobile,
                    email,
                    gender,
                    aadhaar,
                    blood_group,
                    country,
                    state,
                    district,
                    pincode
                };

                if (userId === "mock_user") {
                    alert("Profile Updated Successfully! (Offline Mock Mode)");
                    localStorage.setItem("mock_profile", JSON.stringify(profileData));
                    localStorage.setItem("userName", name);
                    if (name !== originalName) localStorage.setItem(`name_updated_${userId}`, "true");
                    if (email !== originalEmail) localStorage.setItem(`email_updated_${userId}`, "true");
                    location.reload();
                    return;
                }

                try {
                    const response = await fetch(`${backendUrl}/api/user/${userId}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(profileData)
                    });

                    const data = await response.json();
                    if (response.ok) {
                        alert("Profile Updated Successfully!");
                        localStorage.setItem("userName", name);
                        if (name !== originalName) localStorage.setItem(`name_updated_${userId}`, "true");
                        if (email !== originalEmail) localStorage.setItem(`email_updated_${userId}`, "true");
                        location.reload();
                    } else {
                        alert("Error: " + data.error);
                    }
                } catch (err) {
                    console.error(err);
                    alert("Network Error: Could not connect to the profile server.");
                }
            });
        }

        // Load profile
        fetchProfile();
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/app-shell.css">
    <script src="../assets/app-shell.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <style>
        .details .recentOrders {
            min-height: auto !important;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .notification_set {
            transition: max-height 0.4s ease;
            overflow: hidden;
        }

        /* Disable hover effect on notifications */
        .details .recentOrders .notification:hover {
            background: transparent !important;
            color: inherit !important;
        }

        /* Topbar Responsiveness Fix */
        .topbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 15px;
        }

        #welcomeTextCard {
            white-space: nowrap;
            flex-shrink: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px !important;
        }

        @media (max-width: 768px) {
            #welcomeTextCard {
                font-size: 0.9rem !important;
                max-width: 120px; /* Further limit name width on tablets */
            }
            .search {
                flex: 1; /* Allow search to take remaining space */
                max-width: 180px;
                margin: 0 5px !important;
            }
        }

        @media (max-width: 480px) {
            #welcomeTextCard {
                display: none; /* Hide name on small mobiles to prioritize search and toggle */
            }
            .search {
                margin: 0 5px !important;
            }
        }

        .notification {
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 15px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        .notification p { font-size: 0.95rem; color: var(--text-dark); }
        .notification .time { font-size: 0.8rem; color: #999; min-width: 140px; text-align: right; }


        /* Modal Styles matching Dashboard */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: modalSlideDown 0.4s ease-out;
        }
        @keyframes modalSlideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h3 { margin-bottom: 10px; font-size: 1.5rem; color: var(--text-dark); }
        .modal-content p { margin-bottom: 30px; color: #666; line-height: 1.5; }
        .modal-footer { display: flex; justify-content: center; gap: 15px; }
        .btn-confirm, .btn-close {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-confirm { background: #ff4d4d; color: white; }
        .btn-close { background: #f0f0f0; color: #555; }

        .btn#clearAllBtn {
            background: #ff4d4d !important;
        }
        .btn#clearAllBtn:hover {
            background: #ff3333 !important;
        }
        .header-btns {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>

<body>
    <!-- =============== Navigation ================ -->
    <div class="container">
        <div class="navigation">
            <ul>
                <li>
                    <a href="#">
                        <div class="nav_logo"> <strong>Noorie <span>Clinic</span></strong></div>
                    </a>
                </li>

                <li>
                    <a href="dashboard.html">
                        <span class="icon">
                            <ion-icon name="home-outline"></ion-icon>
                        </span>
                        <span class="title">Dashboard</span>
                    </a>
                </li>

                <li>
                    <a href="appointment.html">
                        <span class="icon">
                            <ion-icon name="alarm-outline"></ion-icon>
                        </span>
                        <span class="title">Book Appointments</span>
                    </a>
                </li>

                <li>
                    <a href="notification.html">
                        <span class="icon">
                            <ion-icon name="notifications-outline"></ion-icon>
                        </span>
                        <span class="title">Notifications</span>
                    </a>
                </li>

                <li>
                    <a href="profile.html">
                        <span class="icon">
                            <ion-icon name="person-outline"></ion-icon>
                        </span>
                        <span class="title">Manage Profile</span>
                    </a>
                </li>

                <li>
                    <a href="password.html">
                        <span class="icon">
                            <ion-icon name="lock-closed-outline"></ion-icon>
                        </span>
                        <span class="title">Change Password</span>
                    </a>
                </li>

                <li>
                    <a href="../index.html">
                        <span class="icon">
                            <ion-icon name="log-out-outline"></ion-icon>
                        </span>
                        <span class="title">Log Out</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- ========================= Main ==================== -->
        <div class="main">
            <div class="topbar">
                <div class="toggle">
                    <ion-icon name="menu-outline"></ion-icon>
                </div>

                <div class="search">
                    <label>
                        <input type="text" placeholder="Search here">
                        <ion-icon name="search-outline"></ion-icon>
                    </label>
                </div>

                <div class="user">
                    <img src="customer01.jpg" alt="">
                </div>
            </div>

            <!-- ================ Notification Detailed List ================= -->
            <div class="details">
                <div class="recentOrders">
                    <div class="cardHeader">
                        <h2>Notifications</h2>
                        <div class="header-btns">
                            <a href="#" class="btn" id="viewAllBtn">View All</a>
                            <a href="#" class="btn" id="clearAllBtn">Clear All</a>
                        </div>
                    </div>

                    <div class="notification_set">
                        <div class="notification" style="text-align: center; padding: 20px;">
                            <p>Loading notifications...</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Generic Modal for User Actions -->
    <div id="userActionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Confirm Action</h3>
            <p id="modalMessage">Are you sure you want to proceed?</p>
            <div class="modal-footer">
                <button id="modalConfirmBtn" class="btn-confirm">Confirm</button>
                <button id="modalCloseBtn" class="btn-close">Close</button>
            </div>
        </div>
    </div>

    <!-- =========== Scripts =========  -->
    <script src="index.js"></script>

    <script>
        // Session security check
        const userId = localStorage.getItem("userId");
        if (!userId) {
            window.location.replace("../index.html");
        }

        const backendUrl = "https://doctor-backend-yrry.onrender.com";
        const MAX_VISIBLE = 10;
        let allNotifications = [];
        let showAll = false;
        let pendingModalAction = null;

        // Fetch and display live notifications
        async function fetchNotifications() {
            if (userId === "mock_user") {
                const sampleNotifications = [
                    { message: "Welcome to Noorie Clinic, Demo Patient! Your account has been registered successfully.", created_at: new Date(Date.now() - 3600000 * 24).toISOString() },
                    { message: "Your security profile details were loaded successfully.", created_at: new Date(Date.now() - 3600000).toISOString() }
                ];
                const customNotifs = JSON.parse(localStorage.getItem("mock_notifications") || "[]");
                allNotifications = [...customNotifs, ...sampleNotifications];
                displayNotifications();
                return;
            }
            try {
                const res = await fetch(`${backendUrl}/api/user/${userId}/notifications`);
                if (res.ok) {
                    allNotifications = await res.json();
                    displayNotifications();
                    markNotificationsAsRead();
                }
            } catch (err) {
                console.error(err);
            }
        }

        function displayNotifications() {
            const visibleList = showAll ? allNotifications : allNotifications.slice(0, MAX_VISIBLE);
            renderNotifications(visibleList);

            // Update buttons visibility
            const viewAllBtn = document.getElementById("viewAllBtn");
            const clearAllBtn = document.getElementById("clearAllBtn");

            if (viewAllBtn) {
                viewAllBtn.style.display = allNotifications.length > MAX_VISIBLE ? "inline-block" : "none";
                viewAllBtn.innerText = showAll ? "Show Less" : "View All";
            }
            if (clearAllBtn) {
                clearAllBtn.style.display = allNotifications.length > 0 ? "inline-block" : "none";
            }
        }

        function renderNotifications(notifications) {
            const container = document.querySelector(".notification_set");
            if (container) {
                container.innerHTML = ""; // Clear placeholders

                if (notifications.length === 0) {
                    container.innerHTML = `<div class="notification" style="text-align: center; padding: 20px;"><p>No notifications yet.</p></div>`;
                    return;
                }

                notifications.forEach(notif => {
                    const div = document.createElement("div");
                    div.className = "notification";
                    
                    const dateObj = new Date(notif.created_at);
                    const relativeTime = dateObj.toLocaleString();

                    div.innerHTML = `
                        <p>${notif.message}</p>
                        <span class="time">${relativeTime}</span>
                    `;
                    container.appendChild(div);
                });
            }
        }

        async function markNotificationsAsRead() {
            if (userId === "mock_user") return;
            try {
                await fetch(`${backendUrl}/api/user/${userId}/notifications/read`, {
                    method: "PATCH"
                });
                // Refresh the sidebar badge using the function from index.js
                if (typeof updateNotificationBadge === "function") {
                    updateNotificationBadge();
                }
            } catch (err) {
                console.error("Failed to mark notifications as read:", err);
            }
        }

        async function clearNotifications() {
            if (userId === "mock_user") {
                // Clear both local storage and the local array for immediate session feedback
                localStorage.setItem("mock_notifications", "[]");
                allNotifications = [];
                displayNotifications();
                return;
            }
            try {
                const response = await fetch(`${backendUrl}/api/user/${userId}/notifications`, {
                    method: "DELETE"
                });
                if (response.ok) {
                    allNotifications = [];
                    displayNotifications();
                    if (typeof updateNotificationBadge === "function") {
                        updateNotificationBadge();
                    }
                }
            } catch (err) {
                console.error("Error clearing notifications:", err);
            }
        }

        function showUserModal(title, message, onConfirm = null) {
            const modal = document.getElementById("userActionModal");
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("modalMessage").innerText = message;

            const confirmBtn = document.getElementById("modalConfirmBtn");
            if (onConfirm) {
                confirmBtn.style.display = "block";
                // Bind the confirm action directly to the button
                confirmBtn.onclick = () => {
                    onConfirm();
                    modal.style.display = "none";
                };
            } else {
                confirmBtn.style.display = "none";
            }
            modal.style.display = "flex";
        }

        // Setup button listeners
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("viewAllBtn")?.addEventListener("click", (e) => {
                e.preventDefault();
                showAll = !showAll;
                displayNotifications();
            });

            document.getElementById("clearAllBtn")?.addEventListener("click", (e) => {
                e.preventDefault();
                showUserModal("Clear All", "Are you sure you want to delete all notifications?", clearNotifications);
            });

            document.getElementById("modalCloseBtn").onclick = () => {
                document.getElementById("userActionModal").style.display = "none";
            };
        });

        fetchNotifications();
    </script>

    <!-- ====== ionicons ======= -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

</html>

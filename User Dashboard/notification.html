            transition: all 0.3s ease;
            overflow: hidden;
        }
        .notification_set {
            transition: max-height 0.4s ease;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <!-- =============== Navigation ================ -->
    <div class="container">
        <div class="navigation">
            <ul>

                    <a href="#">
                        <div class="nav_logo"> <strong>Noorie <span>Clinic</span></strong></div>
                    </a>
                </li>

                <li>
                    <a href="dashboard.html">
                        <span class="icon">
                            <ion-icon name="home-outline"></ion-icon>
                        </span>
                        <span class="title">Dashboard</span>
                    </a>
                </li>

                <li>
                    <a href="appointment.html">
                        <span class="icon">
                            <ion-icon name="alarm-outline"></ion-icon>
                        </span>
                        <span class="title">Book Appointments</span>
                    </a>
                </li>

                <li>
                    <a href="notification.html">
                        <span class="icon">
                            <ion-icon name="notifications-outline"></ion-icon>
                        </span>
                        <span class="title">Notifications</span>
                    </a>
                </li>

                <li>
                    <a href="profile.html">
                        <span class="icon">
                            <ion-icon name="person-outline"></ion-icon>
                        </span>
                        <span class="title">Manage Profile</span>
                    </a>
                </li>

                <li>
                    <a href="password.html">
                        <span class="icon">
                            <ion-icon name="lock-closed-outline"></ion-icon>
                        </span>
                        <span class="title">Change Password</span>
                    </a>
                </li>

                <li>
                    <a href="../index.html">
                        <span class="icon">
                            <ion-icon name="log-out-outline"></ion-icon>
                        </span>
                        <span class="title">Log Out</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- ========================= Main ==================== -->
        <div class="main">
            <div class="topbar">
                <div class="toggle">
                    <ion-icon name="menu-outline"></ion-icon>
                </div>

                <div class="search">
                    <label>
                        <input type="text" placeholder="Search here">
                        <ion-icon name="search-outline"></ion-icon>
                    </label>
                </div>

                <div class="user">
                    <img src="customer01.jpg" alt="">
                </div>
            </div>

            <!-- ================ Notification Detailed List ================= -->
            <div class="details">
                <div class="recentOrders">
                    <div class="cardHeader">
                        <h2>Notifications</h2>
                        <a href="#" class="btn" id="viewAllBtn">View All</a>
                    </div>

                    <div class="notification_set">
                        <div class="notification" style="text-align: center; padding: 20px;">
                            <p>Loading notifications...</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- =========== Scripts =========  -->
    <script src="index.js"></script>

    <script>
        // Session security check
        const userId = localStorage.getItem("userId");
        if (!userId) {
            window.location.replace("../index.html");
        }

        const backendUrl = "http://localhost:10000";
        const MAX_VISIBLE = 10;
        let allNotifications = [];
        let showAll = false;

        // Fetch and display live notifications
        async function fetchNotifications() {
            if (userId === "mock_user") {
                const sampleNotifications = [
                    { message: "Welcome to Noorie Clinic, Demo Patient! Your account has been registered successfully.", created_at: new Date(Date.now() - 3600000 * 24).toISOString() },
                    { message: "Your security profile details were loaded successfully.", created_at: new Date(Date.now() - 3600000).toISOString() }
                ];
                const customNotifs = JSON.parse(localStorage.getItem("mock_notifications") || "[]");
                allNotifications = [...customNotifs, ...sampleNotifications];
                displayNotifications();
                return;
            }
            try {
                const res = await fetch(`${backendUrl}/api/user/${userId}/notifications`);
                if (res.ok) {
                    allNotifications = await res.json();
                    displayNotifications();
                }
            } catch (err) {
                console.error(err);
            }
        }

        function displayNotifications() {
            const visibleList = showAll ? allNotifications : allNotifications.slice(0, MAX_VISIBLE);
            renderNotifications(visibleList);

            // Update View All button
            const viewAllBtn = document.getElementById("viewAllBtn");
            if (viewAllBtn) {
                viewAllBtn.style.display = "inline-block";
                viewAllBtn.innerText = showAll ? "Show Less" : "View All";
            }
        }

        function renderNotifications(notifications) {
            const container = document.querySelector(".notification_set");
            if (container) {
                container.innerHTML = ""; // Clear placeholders

                if (notifications.length === 0) {
                    container.innerHTML = `<div class="notification" style="text-align: center; padding: 20px;"><p>No notifications yet.</p></div>`;
                    return;
                }

                notifications.forEach(notif => {
                    const div = document.createElement("div");
                    div.className = "notification";
                    
                    const dateObj = new Date(notif.created_at);
                    const relativeTime = dateObj.toLocaleString();

                    div.innerHTML = `
                        <p>${notif.message}</p>
                        <span class="time">${relativeTime}</span>
                    `;
                    container.appendChild(div);
                });
            }
        }

        // Setup View All button
        document.addEventListener("DOMContentLoaded", () => {
            const viewAllBtn = document.getElementById("viewAllBtn");
            if (viewAllBtn) {
                viewAllBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    showAll = !showAll;
                    displayNotifications();
                });
            }
        });

        fetchNotifications();
    </script>

    <!-- ====== ionicons ======= -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/app-shell.css">
    <script src="../assets/app-shell.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <style>
        /* Topbar Responsiveness Fix */
        .topbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 15px;
        }

        #welcomeTextCard {
            white-space: nowrap;
            flex-shrink: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px !important;
        }

        @media (max-width: 768px) {
            #welcomeTextCard {
                font-size: 0.9rem !important;
                max-width: 120px; /* Further limit name width on tablets */
            }
            .search {
                flex: 1; /* Allow search to take remaining space */
                max-width: 180px;
                margin: 0 5px !important;
            }
        }

        @media (max-width: 480px) {
            #welcomeTextCard {
                display: none; /* Hide name on small mobiles to prioritize search and toggle */
            }
            .search {
                margin: 0 5px !important;
            }
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: modalSlideDown 0.4s ease-out;
        }
        @keyframes modalSlideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h3 { margin-bottom: 10px; font-size: 1.5rem; color: var(--text-dark); }
        .modal-content p { margin-bottom: 30px; color: #666; line-height: 1.5; }
        .modal-footer { display: flex; justify-content: center; gap: 15px; }
        .btn-confirm, .btn-close {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-confirm { background: var(--primary-color); color: white; }
        .btn-close { background: #f0f0f0; color: #555; }
    </style>
</head>

<body>
    <!-- =============== Navigation ================ -->
    <div class="container">
        <div class="navigation">
            <ul>
                <li>
                    <a href="#">
                        <div class="nav_logo"> <strong>Noorie <span>Clinic</span></strong></div>
                    </a>
                </li>

                <li>
                    <a href="dashboard.html">
                        <span class="icon">
                            <ion-icon name="home-outline"></ion-icon>
                        </span>
                        <span class="title">Dashboard</span>
                    </a>
                </li>

                <li>
                    <a href="appointment.html">
                        <span class="icon">
                            <ion-icon name="alarm-outline"></ion-icon>
                        </span>
                        <span class="title">Book Appointments</span>
                    </a>
                </li>

                <li>
                    <a href="notification.html">
                        <span class="icon">
                            <ion-icon name="notifications-outline"></ion-icon>
                        </span>
                        <span class="title">Notifications</span>
                    </a>
                </li>

                <li>
                    <a href="profile.html">
                        <span class="icon">
                            <ion-icon name="person-outline"></ion-icon>
                        </span>
                        <span class="title">Manage Profile</span>
                    </a>
                </li>

                <li>
                    <a href="password.html">
                        <span class="icon">
                            <ion-icon name="lock-closed-outline"></ion-icon>
                        </span>
                        <span class="title">Change Password</span>
                    </a>
                </li>

                <li>
                    <a href="../index.html">
                        <span class="icon">
                            <ion-icon name="log-out-outline"></ion-icon>
                        </span>
                        <span class="title">Log Out</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- ========================= Main ==================== -->
        <div class="main">
            <div class="topbar">
                <div class="toggle">
                    <ion-icon name="menu-outline"></ion-icon>
                </div>

                <div class="search">
                    <label>
                        <input type="text" placeholder="Search here">
                        <ion-icon name="search-outline"></ion-icon>
                    </label>
                </div>

                <div class="user">
                    <img src="customer01.jpg" alt="">
                </div>
            </div>

            <!-- ================ Password Change ================= -->
            <div class="password_header">
                <div class="password_main">
                    <form id="passwordForm">
                        <div class="password_input">
                            <ion-icon name="lock-closed"></ion-icon>
                            <input type="password" name="" placeholder="Current Password" required>
                        </div>

                        <div class="password_input">
                            <ion-icon name="lock-closed"></ion-icon>
                            <input type="password" name="" placeholder="New Password" required>
                        </div>
                        <p style="font-size: 11px; color: var(--text-light); text-align: left; margin: -10px 0 15px 5px;">
                            * Password must be at least 8 characters with letters, numbers, and symbols.
                        </p>

                        <div class="password_input">
                            <ion-icon name="lock-closed"></ion-icon>
                            <input type="password" name="" placeholder="Confirm New Password" required>
                        </div>

                        <div class="button_field">
                            <button type="submit">Change Password</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Generic Modal for User Actions -->
    <div id="userActionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Status</h3>
            <p id="modalMessage"></p>
            <div class="modal-footer">
                <button id="modalConfirmBtn" class="btn-confirm">Confirm</button>
                <button id="modalCloseBtn" class="btn-close">Close</button>
            </div>
        </div>
    </div>

    <!-- =========== Scripts =========  -->
    <script src="index.js"></script>

    <script>
        // Session security check
        const userId = localStorage.getItem("userId");
        if (!userId) {
            window.location.replace("../index.html");
        }

        const backendUrl = window.APP_BACKEND_URL;

        function showUserModal(title, message, onConfirm = null) {
            const modal = document.getElementById("userActionModal");
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("modalMessage").innerText = message;

            const confirmBtn = document.getElementById("modalConfirmBtn");
            if (onConfirm) {
                confirmBtn.style.display = "block";
                confirmBtn.onclick = () => {
                    onConfirm();
                    modal.style.display = "none";
                };
            } else {
                confirmBtn.style.display = "none";
            }
            modal.style.display = "flex";
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("modalCloseBtn").onclick = () => {
                document.getElementById("userActionModal").style.display = "none";
            };
            window.onclick = (event) => {
                const modal = document.getElementById("userActionModal");
                if (event.target === modal) modal.style.display = "none";
            };
        });

        // Bind form submission to change password
        const form = document.getElementById("passwordForm");
        if (form) {
            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const currentPassword = document.querySelector('input[placeholder="Current Password"]').value;
                const newPassword = document.querySelector('input[placeholder="New Password"]').value;
                const confirmNewPassword = document.querySelector('input[placeholder="Confirm New Password"]').value;

                if (newPassword !== confirmNewPassword) {
                    showUserModal("Validation Error", "New passwords do not match!");
                    return;
                }

                // Password complexity validation: 8+ chars, alphabet, number, special char
                const passwordRegex = /^(?=.*[a-zA-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,}$/;
                if (!passwordRegex.test(newPassword)) {
                    showUserModal("Security Requirement", "New password must be at least 8 characters long and include alphabets, numbers, and special characters.");
                    return;
                }

                if (userId === "mock_user") {
                    const mockNotifs = JSON.parse(localStorage.getItem("mock_notifications") || "[]");
                    mockNotifs.unshift({
                        message: "Your security password was changed successfully.",
                        created_at: new Date().toISOString()
                    });
                    localStorage.setItem("mock_notifications", JSON.stringify(mockNotifs));
                    
                    showUserModal("Success", "Password Changed Successfully! (Offline Mock Mode)", () => form.reset());
                    return;
                }

                try {
                    const response = await fetch(`${backendUrl}/api/user/${userId}/password`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            currentPassword,
                            newPassword
                        })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        showUserModal("Success", "Password Changed Successfully!", () => form.reset());
                    } else {
                        showUserModal("Update Failed", "Error: " + data.error);
                    }
                } catch (err) {
                    console.error(err);
                    showUserModal("Network Error", "Could not connect to the password server.");
                }
            });
        }
    </script>

    <!-- ====== ionicons ======= -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

</html>

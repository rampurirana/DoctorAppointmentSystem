        <!-- ========================= Main ==================== -->

            <!-- ================ Password Change ================= -->
            <div class="password_header">
                <div class="password_main">
                    <form id="passwordForm">
                        <div class="password_input">
                            <ion-icon name="lock-closed"></ion-icon>
                            <input type="password" name="" placeholder="Current Password" required>
                        </div>

                        <div class="password_input">
                            <ion-icon name="lock-closed"></ion-icon>
                            <input type="password" name="" placeholder="New Password" required>
                        </div>
                        <p style="font-size: 11px; color: var(--text-light); text-align: left; margin: -10px 0 15px 5px;">
                            * Password must be at least 8 characters with letters, numbers, and symbols.
                        </p>

                        <div class="password_input">
                            <ion-icon name="lock-closed"></ion-icon>
                            <input type="password" name="" placeholder="Confirm New Password" required>
                        </div>

                        <div class="button_field">
                            <button type="submit">Change Password</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- =========== Scripts =========  -->
    <script src="index.js"></script>

    <script>
        // Session security check
        const userId = localStorage.getItem("userId");
        if (!userId) {
            window.location.replace("../index.html");
        }

        const backendUrl = "http://localhost:10000";

        // Bind form submission to change password
        const form = document.getElementById("passwordForm");
        if (form) {
            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const currentPassword = document.querySelector('input[placeholder="Current Password"]').value;
                const newPassword = document.querySelector('input[placeholder="New Password"]').value;
                const confirmNewPassword = document.querySelector('input[placeholder="Confirm New Password"]').value;

                if (newPassword !== confirmNewPassword) {
                    alert("New passwords do not match!");
                    return;
                }

                // Password complexity validation: 8+ chars, alphabet, number, special char
                const passwordRegex = /^(?=.*[a-zA-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,}$/;
                if (!passwordRegex.test(newPassword)) {
                    alert("New password must be at least 8 characters long and include alphabets, numbers, and special characters.");
                    return;
                }

                if (userId === "mock_user") {
                    alert("Password Changed Successfully! (Offline Mock Mode)");
                    
                    const mockNotifs = JSON.parse(localStorage.getItem("mock_notifications") || "[]");
                    mockNotifs.unshift({
                        message: "Your security password was changed successfully.",
                        created_at: new Date().toISOString()
                    });
                    localStorage.setItem("mock_notifications", JSON.stringify(mockNotifs));
                    
                    form.reset();
                    return;
                }

                try {
                    const response = await fetch(`${backendUrl}/api/user/${userId}/password`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            currentPassword,
                            newPassword
                        })
                    });

                    const data = await response.json();
                    if (response.ok) {
                        alert("Password Changed Successfully!");
                        form.reset();
                    } else {
                        alert("Error: " + data.error);
                    }
                } catch (err) {
                    console.error(err);
                    alert("Network Error: Could not connect to the password server.");
                }
            });
        }
    </script>

    <!-- ====== ionicons ======= -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
